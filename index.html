<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikTok Mini App Platform V1</title>
<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json" />
<script defer src="app.js"></script>
</head>
<body>

<header class="topbar">
  <h1>🎮 Mini App Hub</h1>

  <div class="top-actions">
    <button id="dailyRewardBtn">🎁</button>
    <button id="soundToggle">🔊</button>
    <a href="/admin/index.html" class="admin-btn">➕ Add App</a>
  </div>
</header>

<section class="hero">
  <h2>🔥 Viral Mini Apps</h2>
  <p>Swipe • Play • Learn • Earn Coins</p>
</section>

<section class="stats">
  <div class="stat-box">
    <span>🪙 Coins</span>
    <strong id="coinCount">0</strong>
  </div>

  <div class="stat-box">
    <span>🏆 Level</span>
    <strong id="levelCount">1</strong>
  </div>
</section>

<main id="appFeed"></main>

<div id="rewardModal" class="reward-modal hidden">
  <div class="reward-content">
    <h2>🎉 Daily Reward</h2>
    <p>You received +20 coins!</p>
    <button onclick="closeReward()">Awesome!</button>
  </div>
</div>

</body>
</html>
