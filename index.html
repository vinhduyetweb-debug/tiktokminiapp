<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MINI APP PLATFORM</title>
<link rel="stylesheet" href="style.css">
<script defer src="app.js"></script>
</head>
<body>

<header class="topbar">
<div>
<h1>🎮 MINI APP PLATFORM</h1>
<p>Interactive Mobile Mini App Ecosystem</p>
</div>

<div class="top-buttons">
<button id="rewardBtn">🎁 Reward</button>
<a href="/admin/index.html">⚙ Admin</a>
</div>
</header>

<section class="hero">
<h2>🔥 Explore Trending Mini Apps</h2>
<p>Swipe • Play • Learn • Explore</p>
</section>

<section class="stats">
<div class="stat">
<span>🪙 Coins</span>
<strong id="coins">0</strong>
</div>

<div class="stat">
<span>🔥 Apps</span>
<strong id="appCount">0</strong>
</div>

<div class="stat">
<span>🏆 XP</span>
<strong id="xp">0</strong>
</div>
</section>

<main id="appFeed"></main>

<div id="rewardModal" class="modal hidden">
<div class="modal-box">
<h2>🎉 Daily Reward</h2>
<p>You earned +20 coins!</p>
<button onclick="closeReward()">Awesome</button>
</div>
</div>

</body>
</html>
