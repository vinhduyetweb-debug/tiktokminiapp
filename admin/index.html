<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App Admin</title>
<style>
body{
font-family:Arial;
background:#020617;
color:white;
padding:20px;
}
input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:none;
}
button{
margin-top:20px;
padding:16px;
width:100%;
border:none;
border-radius:999px;
background:#22c55e;
color:white;
font-size:18px;
}
pre{
margin-top:20px;
background:#111827;
padding:20px;
border-radius:20px;
overflow:auto;
}
</style>
</head>
<body>

<h1>➕ Mini App Generator</h1>

<input id="name" placeholder="App Name">
<input id="emoji" placeholder="Emoji">
<input id="slug" placeholder="app-slug">
<textarea id="description" placeholder="Description"></textarea>

<button onclick="generate()">Generate App Config</button>

<pre id="output"></pre>

<script>
function generate(){

const app = {
id: document.getElementById('slug').value,
name: document.getElementById('name').value,
emoji: document.getElementById('emoji').value,
description: document.getElementById('description').value,
url: '/apps/' + document.getElementById('slug').value + '/'
};

document.getElementById('output').innerText =
JSON.stringify(app,null,2);

}
</script>

</body>
</html>
